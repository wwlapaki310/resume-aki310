name: Generate Resume HTML

on:
  push:
    branches: ["main", "feature/**"]
    paths:
      - "data/**"
      - "template/**"
      - "build.js"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build general profile
        run: node build.js --profile=general

      - name: Build google profile
        run: node build.js --profile=google

      - name: Copy general build to index.html (for GitHub Pages)
        run: cp dist/resume-general.html index.html

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ index.html
          git diff --cached --quiet || git commit -m "ci: regenerate resume HTML [skip ci]"
          git push
